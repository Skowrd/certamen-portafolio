<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Diego Cruz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="img/devil.png" alt="Logo Diego Cruz" width="40" height="40">
                <span>Diego Cruz</span>
            </div>
            <ul>
                <li><a href="#habilidades">Habilidades</a></li>
                <li><a href="#proyectos">Proyectos</a></li>
                <li><a href="#contacto">Contacto</a></li>
                <li><a href="#sobre-mi">Sobre mí</a></li>
            </ul>
        </nav>
    </header>

    <main>

    <section id="habilidades" class="hero">
        <article class="hero-content">
            <h1>Hola, soy Diego Cruz</h1>
            <p class="subtitle">estudiante de desarrollo web</p>
            <p>amante de crear paginas bonitas, actualmente cursando la carrera de programacion en el instituto tecnico</p>
        </article>
        <aside class="hero-image" aria-label="Imagen de perfil">
            <img src="img/rabbit.png" alt="Avatar de Diego Cruz" width="150" height="150">
        </aside>
    </section>

    </main>

</body>
</html>
